name: Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: "40 22 * * *"  # 日本時間 7:40（UTC基準）

permissions:
  contents: write

jobs:
  build-deploy-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline (Slack は Surge 後)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/run_daily.py --skip-notify

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site
          git diff --cached --quiet || (git commit -m "chore: add daily industry topics site" && git push)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy site to Surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: npx surge ./site ${{ secrets.SURGE_DOMAIN }} --token "$SURGE_TOKEN"

      - name: Post Slack after deploy
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: python src/notify/post_slack.py